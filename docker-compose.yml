version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: budgeting_app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: budgeting_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: budgeting_app_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/budgeting_app
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

volumes:
  postgres_data:
